# Frontend + API на порту 80 (без указания порта)
server {
    listen 80;
    server_name _;
    
    client_max_body_size 100M;
    
    # API endpoints - проксируем в Symfony backend
    location /api {
        root /var/www/backend/public;
        rewrite ^/api/(.*)$ /index.php last;
    }
    
    # PHP-FPM для backend
    location ~ ^/index\.php(/|$) {
        root /var/www/backend/public;
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
    }
    
    # Uploads из backend
    location /uploads {
        alias /var/www/backend/public/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Frontend статика и Vue роутинг
    location / {
        root /var/www/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
    
    # Статические файлы frontend с кэшированием
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}

# API на порту 8000 (для разработки фронтенда)
server {
    listen 8000;
    server_name _;
    root /var/www/backend/public;
    index index.php;

    client_max_body_size 100M;

    # CORS заголовки для разработки
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
    add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, X-Requested-With' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range, Link' always;

    # Обработка preflight запросов
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, X-Requested-With' always;
        add_header 'Access-Control-Max-Age' 3600;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    location /uploads {
        alias /var/www/backend/public/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}

